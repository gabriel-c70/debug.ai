<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexChat</title>
    <link rel="stylesheet" href="hi.css">
    <script src="work.js" defer></script>
</head>
<body>
<h1>LexChat</h1>
<p class="intro">Hi there, my name is LexChat</p>

        <button class="button" onclick="sendMessage()">➤</button>
    </div>
</div>

<div id="aiResponse"></div>
